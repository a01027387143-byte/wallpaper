<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikke Minimalist Background</title>
    <style>
        /* 기본 스타일 초기화 및 화면 꽉 채우기 */
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* 기본 하얀색 배경 */
            overflow: hidden;
        }

        /* 전체 컨테이너 고정 크기 (Lively Wallpaper용 비례 설정) */
        #wallpaper-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* ------------------------------------
           배경 도형 레이어 (핵심 수정 부분)
        ------------------------------------ */
        .bg-shape {
            position: absolute;
            background: #cc1111; /* 빨간색 */
            transform: skewX(-15deg);
            transition: transform 0.1s ease-out;
        }

        /* 왼쪽 큰 빨간색 절단면 배경 */
        .bg-left {
            left: -5%;
            top: -10%;
            width: 55%;
            height: 120%;
        }

        /* 오른쪽 위 작은 빨간색 절단면 배경 */
        .bg-right {
            right: 15%;
            top: 5%;
            width: 35%;
            height: 80%;
            opacity: 0.8;
        }

        /* ------------------------------------
           추가적인 기하학적 요소 (선택 사항)
        ------------------------------------ */
        /* 더 역동적인 느낌을 위해 추가적인 절단면을 넣을 수 있습니다. */
        .bg-mid {
            position: absolute;
            background: rgba(201, 10, 10, 0.4);
            transform: skewX(-15deg);
            width: 15%;
            height: 60%;
            top: 20%;
            left: 50%;
        }
    </style>
</head>
<body>

    <div id="wallpaper-container">
        <div class="bg-shape bg-left"></div>
        <div class="bg-shape bg-right"></div>
        <div class="bg-mid"></div> </div>

    <script>
        const container = document.getElementById('wallpaper-container');
        const bgShapes = document.querySelectorAll('.bg-shape');

        container.addEventListener('mousemove', (e) => {
            // 마우스 위치에 따라 배경 판이 미세하게 움직이는 효과
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            
            bgShapes.forEach(shape => {
                shape.style.transform = `skewX(-15deg) translate(${xAxis}px, ${yAxis}px)`;
            });
        });
    </script>
</body>
</html>
