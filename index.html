<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Wallpaper</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ffffff;
}

body{
    position:relative;
}

/* 공통 */
.line{
    position:absolute;
    width:650px;
    height:28px;
    background:#ff0000;

    border-radius:20px;

    /* 세로에서 시계방향 10도 */
    transform:rotate(100deg);

    transform-origin:left center;
}

/* 위치 */
.line1{
    left:1820px;
    top:330px;
}

.line2{
    left:1760px;
    top:430px;
}

.line3{
    left:1700px;
    top:530px;
}

</style>
</head>

<body>

<div class="line line1"></div>
<div class="line line2"></div>
<div class="line line3"></div>

</body>
</html>
